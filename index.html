<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo Flex</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: #f4f4f9; 
            margin: 0;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 25px; 
        }
        button:active { background: #218838; }
        #resultado { 
            margin-top: 25px; 
            text-align: center; 
            font-size: 1.2em; 
            color: #333; 
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cálculo Consumo Flex</h2>
        
        <label>Distância percorrida (Km):</label>
        <input type="number" id="km" placeholder="Ex: 350" step="0.1">

        <label>Etanol (Litros):</label>
        <input type="number" id="etanol" placeholder="Ex: 20" step="0.1" value="0">

        <label>Gasolina (Litros):</label>
        <input type="number" id="gasolina" placeholder="Ex: 15" step="0.1" value="0">

        <button onclick="calcularConsumo()">Calcular Média</button>

        <div id="resultado"></div>
    </div>

    <script>
        function calcularConsumo() {
            const km = parseFloat(document.getElementById('km').value) || 0;
            const etanol = parseFloat(document.getElementById('etanol').value) || 0;
            const gasolina = parseFloat(document.getElementById('gasolina').value) || 0;

            const totalLitros = etanol + gasolina;
            const divResultado = document.getElementById('resultado');

            if (km <= 0 || totalLitros <= 0) {
                divResultado.style.display = 'block';
                divResultado.innerHTML = '<span style="color: red;">Insira valores válidos de Km e Litros.</span>';
                return;
            }

            const media = km / totalLitros;
            const percEtanol = (etanol / totalLitros) * 100;
            const percGasolina = (gasolina / totalLitros) * 100;

            divResultado.style.display = 'block';
            divResultado.innerHTML = `
                <strong>Média: ${media.toFixed(2)} Km/L</strong><br><br>
                <span style="font-size: 0.85em; color: #555;">
                    Mistura no tanque:<br>
                    ${percEtanol.toFixed(0)}% Etanol | ${percGasolina.toFixed(0)}% Gasolina
                </span>
            `;
        }

        // Registra o Service Worker para permitir a instalação
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registrado!', reg);
                }).catch(err => {
                    console.log('Falha no registro do Service Worker', err);
                });
            });
        }
    </script>

</body>
</html>
